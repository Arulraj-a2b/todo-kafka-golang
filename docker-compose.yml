services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: arul_todo
      POSTGRES_PASSWORD: arul
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # No host port — host already has Postgres on 5432.
    # Inspect with: docker compose exec postgres psql -U arul_todo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arul_todo"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    # No host port — host already has Redis/Valkey on 6379.
    # Inspect with: docker compose exec redis redis-cli

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    # No host port — host already has Kafka on 9092.
    # Inside the docker network, services use kafka:29092.
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 12

  # Tiny one-shot container that creates required topics after Kafka is up.
  # Auto-create works for most cases but fails when a producer races startup
  # before Kafka has registered the partition leader. Pre-creating both
  # topics removes the race window.
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [kafka]
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "waiting for Kafka..."
        for i in $$(seq 1 30); do
          kafka-topics --bootstrap-server kafka:29092 --list >/dev/null 2>&1 && break
          sleep 2
        done
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic todos --partitions 12 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic email.events --partitions 12 --replication-factor 1
        echo "topics ready:"
        kafka-topics --bootstrap-server kafka:29092 --list
    restart: "no"

  auth-service:
    build: ./auth-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      jaeger:
        condition: service_started
    environment:
      AUTH_DATABASE_URL: postgres://arul_todo:arul@postgres:5432/auth_db?sslmode=disable
      JWT_SECRET: 6WctFe+dOzH5jmj+J/PYwGfWmzXB/9OI4hIwE2ORsJ4=
      PORT: "8000"
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      OTEL_SERVICE_NAME: auth-service
      LOG_FORMAT: json
      LOG_LEVEL: info
      TRACE_SAMPLE_RATE: "1.0"
    deploy:
      replicas: 2

  todo-service:
    build: ./todo-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
      jaeger:
        condition: service_started
    environment:
      TODO_DATABASE_URL: postgres://arul_todo:arul@postgres:5432/todo_db?sslmode=disable
      JWT_SECRET: 6WctFe+dOzH5jmj+J/PYwGfWmzXB/9OI4hIwE2ORsJ4=
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC: todos
      PORT: "8001"
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      OTEL_SERVICE_NAME: todo-service
      LOG_FORMAT: json
      LOG_LEVEL: info
      TRACE_SAMPLE_RATE: "1.0"
    deploy:
      replicas: 2

  notification-worker:
    build: ./notification-worker
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_started
      jaeger:
        condition: service_started
    environment:
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC: todos
      KAFKA_GROUP_ID: notification-worker
      KAFKA_EMAIL_TOPIC: email.events
      KAFKA_EMAIL_GROUP_ID: notification-worker-email
      REDIS_URL: redis://redis:6379
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-arulraj@vananam.com}
      SENDGRID_FROM_NAME: ${SENDGRID_FROM_NAME:-Todo App}
      METRICS_PORT: "9100"
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      OTEL_SERVICE_NAME: notification-worker
      LOG_FORMAT: json
      LOG_LEVEL: info
      TRACE_SAMPLE_RATE: "1.0"
    deploy:
      replicas: 2

  email-scheduler:
    build: ./email-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
      jaeger:
        condition: service_started
    environment:
      AUTH_DATABASE_URL: postgres://arul_todo:arul@postgres:5432/auth_db?sslmode=disable
      TODO_DATABASE_URL: postgres://arul_todo:arul@postgres:5432/todo_db?sslmode=disable
      REDIS_URL: redis://redis:6379
      KAFKA_BROKER: kafka:29092
      KAFKA_EMAIL_TOPIC: email.events
      OVERDUE_SCAN_INTERVAL: ${OVERDUE_SCAN_INTERVAL:-5m}
      DAILY_SUMMARY_CRON: ${DAILY_SUMMARY_CRON:-0 9 * * *}
      METRICS_PORT: "9101"
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      OTEL_SERVICE_NAME: email-scheduler
      LOG_FORMAT: json
      LOG_LEVEL: info
      TRACE_SAMPLE_RATE: "1.0"
    # Single replica — two would double-fire the daily summary.

  gateway-service:
    build: ./gateway-service
    depends_on:
      - auth-service
      - todo-service
      - redis
      - jaeger
    ports:
      - "8090:8080"
    environment:
      GATEWAY_PORT: "8080"
      AUTH_SERVICE_URL: http://auth-service:8000
      TODO_SERVICE_URL: http://todo-service:8001
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      OTEL_SERVICE_NAME: gateway-service
      LOG_FORMAT: json
      LOG_LEVEL: info
      TRACE_SAMPLE_RATE: "1.0"
    # Single replica because we publish a host port. To scale gateway, drop
    # the ports: above and put a real load balancer (nginx/Traefik) in front.

  todo-fe:
    build: ./todo-fe
    depends_on:
      - gateway-service
    ports:
      - "5173:80"

  prometheus:
    image: prom/prometheus:v2.55.0
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=24h'

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  pgdata:
  promdata:
  grafanadata:
