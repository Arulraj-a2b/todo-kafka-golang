server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS (127.0.0.11) and a runtime variable so nginx
    # doesn't try to resolve "gateway-service" at startup. This avoids
    # "host not found in upstream" when nginx boots before the gateway is up.
    resolver 127.0.0.11 valid=30s ipv6=off;

    location /api/ {
        set $gateway_upstream "http://gateway-service:8080";
        proxy_pass $gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
