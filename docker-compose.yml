services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: arul_todo
      POSTGRES_PASSWORD: arul
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # No host port — host already has Postgres on 5432.
    # Inspect with: docker compose exec postgres psql -U arul_todo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arul_todo"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    # No host port — host already has Redis/Valkey on 6379.
    # Inspect with: docker compose exec redis redis-cli

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    # No host port — host already has Kafka on 9092.
    # Inside the docker network, services use kafka:29092.
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 12

  auth-service:
    build: ./auth-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      AUTH_DATABASE_URL: postgres://arul_todo:arul@postgres:5432/auth_db?sslmode=disable
      JWT_SECRET: 6WctFe+dOzH5jmj+J/PYwGfWmzXB/9OI4hIwE2ORsJ4=
      PORT: "8000"
      REDIS_URL: redis://redis:6379
    deploy:
      replicas: 2

  todo-service:
    build: ./todo-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
    environment:
      TODO_DATABASE_URL: postgres://arul_todo:arul@postgres:5432/todo_db?sslmode=disable
      JWT_SECRET: 6WctFe+dOzH5jmj+J/PYwGfWmzXB/9OI4hIwE2ORsJ4=
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC: todos
      PORT: "8001"
      REDIS_URL: redis://redis:6379
    deploy:
      replicas: 2

  notification-worker:
    build: ./notification-worker
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_started
    environment:
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC: todos
      KAFKA_GROUP_ID: notification-worker
      REDIS_URL: redis://redis:6379
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-arulraj@vananam.com}
      SENDGRID_FROM_NAME: ${SENDGRID_FROM_NAME:-Todo App}
    deploy:
      replicas: 2

  gateway-service:
    build: ./gateway-service
    depends_on:
      - auth-service
      - todo-service
      - redis
    ports:
      - "8090:8080"
    environment:
      GATEWAY_PORT: "8080"
      AUTH_SERVICE_URL: http://auth-service:8000
      TODO_SERVICE_URL: http://todo-service:8001
      REDIS_URL: redis://redis:6379
    # Single replica because we publish a host port. To scale gateway, drop
    # the ports: above and put a real load balancer (nginx/Traefik) in front.

  todo-fe:
    build: ./todo-fe
    depends_on:
      - gateway-service
    ports:
      - "5173:80"

volumes:
  pgdata:
